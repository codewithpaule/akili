<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password | AKILI</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="nav-mount"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Reset password</h1>
      <p class="sub">Enter your email and we will send a secure link.</p>
      <form id="forgot-form">
        <div class="auth-field"><label>Email</label><input type="email" id="email" required autocomplete="email"></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Send reset link</button>
      </form>
      <p style="margin-top:1.25rem;font-size:0.9rem;color:var(--slate)"><a href="login.html">← Back to sign in</a></p>
    </div>
  </div>
  <script src="js/config.runtime.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('forgot-form').onsubmit = async (e) => {
      e.preventDefault();
      try {
        const data = await AKILI_AUTH.api('/api/v1/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email: document.getElementById('email').value }),
        });
        AKILI.showToast(data.message || 'Check your email', 'success');
      } catch (err) { AKILI.showToast(err.message, 'error'); }
    };
  </script>
</body>
</html>
