<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set new password — AKILI</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="nav-mount"></div>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>New password</h1>
      <p class="sub">Choose a strong password (8+ characters).</p>
      <form id="reset-form">
        <div class="auth-field"><label>New password</label><input type="password" id="password" required minlength="8" autocomplete="new-password"></div>
        <div class="auth-field"><label>Confirm password</label><input type="password" id="confirm" required minlength="8" autocomplete="new-password"></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Update password</button>
      </form>
      <p style="margin-top:1.25rem;font-size:0.9rem;color:var(--slate)"><a href="login.html">Sign in</a></p>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      AKILI.showToast('Missing reset token — use the link from your email', 'error');
    }
    document.getElementById('reset-form').onsubmit = async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password !== confirm) {
        AKILI.showToast('Passwords do not match', 'error');
        return;
      }
      try {
        const data = await AKILI_AUTH.api('/api/v1/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, password, confirm_password: confirm }),
        });
        AKILI_AUTH.setSession(data.token, data.user);
        AKILI.showToast('Password updated — signed in', 'success');
        location.href = 'dashboard.html';
      } catch (err) { AKILI.showToast(err.message, 'error'); }
    };
  </script>
</body>
</html>
