<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phone Investigator — AKILI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="nav-mount"></div>
  <main class="container" style="padding:1.5rem">
    <p class="breadcrumb">Home &gt; Intelligence &gt; Phone</p>
    <div class="card" style="border-top:4px solid var(--mod-person)"><h1>Phone Investigator</h1><p class="label-sm">Search public web for social matches by phone number.</p></div>
    <div class="card">
      <input id="phone-input" placeholder="+2348012345678 or 08012345678" style="width:100%;padding:0.75rem;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:0.75rem">
      <div style="display:flex;gap:0.5rem">
        <button id="phone-scan-btn" class="btn btn-primary">Scan</button>
        <button id="phone-normalize-btn" class="btn btn-outline">Normalize</button>
      </div>
    </div>

    <div id="phone-results" class="hidden">
      <div class="card">
        <h3>Normalized</h3>
        <p id="phone-normalized">—</p>
      </div>
      <div class="card">
        <h3>Social Matches</h3>
        <div id="phone-matches"></div>
      </div>
      <div class="card">
        <h3>Evidence</h3>
        <div id="phone-evidence"></div>
      </div>
    </div>
  </main>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('phone-normalize-btn').addEventListener('click', async () => {
      const v = document.getElementById('phone-input').value.trim();
      if (!v) return AKILI.showToast('Enter phone', 'error');
      try {
        const res = await AKILI.apiFetch('/api/v1/phone/normalize', { method: 'POST', body: JSON.stringify({ phone: v }) });
        const d = await res.json();
        document.getElementById('phone-normalized').textContent = JSON.stringify(d);
        document.getElementById('phone-results').classList.remove('hidden');
      } catch (e) { AKILI.showToast(e.message || 'Normalize failed', 'error'); }
    });
    document.getElementById('phone-scan-btn').addEventListener('click', async () => {
      const v = document.getElementById('phone-input').value.trim();
      if (!v) return AKILI.showToast('Enter phone', 'error');
      try {
        const res = await AKILI.apiFetch('/api/v1/phone/scan', { method: 'POST', body: JSON.stringify({ phone: v }) });
        const d = await res.json();
        document.getElementById('phone-normalized').textContent = JSON.stringify(d.normalized || {});
        const matches = d.social_matches || [];
        const mount = document.getElementById('phone-matches');
        mount.innerHTML = matches.length ? matches.map(m=>`<div class="platform-row"><strong>${AKILI.escapeHtml(m.platform)}</strong>: ${AKILI.externalLink(m.url||'', m.handle||m.url||'view')}</div>`).join('') : '<p class="label-sm">No matches</p>';
        const ev = document.getElementById('phone-evidence');
        ev.innerHTML = (d.evidence||[]).slice(0,12).map(it=>`<div style="margin-bottom:0.5rem">${AKILI.externalLink(it.link||'', it.link||it.title||'source')}<div class="label-sm" style="color:var(--slate)">${AKILI.escapeHtml(it.snippet||'')}</div></div>`).join('');
        document.getElementById('phone-results').classList.remove('hidden');
      } catch (e) { AKILI.showToast(e.message || 'Scan failed', 'error'); }
    });
  </script>
</body>
</html>
