<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | AKILI</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Contact AKILI — send us a message or request support.">
  <meta property="og:title" content="Contact AKILI">
  <meta property="og:description" content="Contact AKILI — send a message or request support.">
  <meta property="og:image" content="/favicon.svg">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body><div id="nav-mount"></div><script>fetch('partials/nav.html').then(r=>r.text()).then(h=>document.getElementById('nav-mount').innerHTML=h);</script>
<main class="container" style="padding:2rem 1.5rem;max-width:560px">
<h1>Contact</h1><p style="color:var(--slate)">Got a question or found something that does not look right? Reach out and someone on the team will get back to you.</p>
<form class="card" id="form" style="margin-top:1.5rem">
<input name="name" required placeholder="Name" style="width:100%;padding:0.75rem;border:1px solid var(--border);margin-bottom:0.75rem;border-radius:var(--radius)">
<input name="email" type="email" required placeholder="Email" style="width:100%;padding:0.75rem;border:1px solid var(--border);margin-bottom:0.75rem;border-radius:var(--radius)">
<input name="subject" required placeholder="Subject" style="width:100%;padding:0.75rem;border:1px solid var(--border);margin-bottom:0.75rem;border-radius:var(--radius)">
<textarea name="message" required rows="5" placeholder="Message" style="width:100%;padding:0.75rem;border:1px solid var(--border);margin-bottom:1rem;border-radius:var(--radius)"></textarea>
<button class="btn btn-primary" type="submit">Send</button>
</form>
<!-- <p style="margin-top:2rem">API / Enterprise: <a href="mailto:api@akili.com.ng">api@akili.com.ng</a></p> -->
</main>
<script src="js/config.runtime.js"></script>
<script src="js/config.js"></script><script src="js/app.js"></script>
<script>
document.getElementById('form').onsubmit = async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  await AKILI.apiFetch('/api/v1/contact',{method:'POST',body:JSON.stringify(Object.fromEntries(fd))});
  AKILI.showToast('Message sent','success'); e.target.reset();
};
</script></body></html>
