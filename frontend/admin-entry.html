<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>AKILI</title>
</head>
<body>
  <script>
    const params = new URLSearchParams(location.search);
    const k = params.get('k') || params.get('key') || '';
    if (k) sessionStorage.setItem('akili_admin_key', k);
    sessionStorage.setItem('akili_admin_entry', '1');
    const base = (window.AKILI_CONFIG && AKILI_CONFIG.ADMIN_UI_PATH) || '/x9Qp3-admin';
    location.replace(String(base).replace(/\/+$/, '') + '/login');
  </script>
</body>
</html>
