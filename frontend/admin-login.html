<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin sign in — AKILI</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body class="admin-login-page">
  <div class="auth-wrap">
    <div class="auth-card admin-auth-card">
      <p class="admin-badge">AKILI Admin</p>
      <h1>Control panel</h1>
      <p class="sub">Sign in with your administrator account.</p>
      <form id="admin-login-form">
        <div id="credentials-step">
          <div class="auth-field"><label>Admin email</label><input type="email" id="email" required autocomplete="username"></div>
          <div class="auth-field"><label>Password</label><input type="password" id="password" required autocomplete="current-password"></div>
          <button type="submit" id="cred-submit" class="btn btn-primary" style="width:100%">Continue</button>
        </div>

        <div id="pin-step" style="display:none">
          <p class="sub">Credentials verified. Enter your admin security PIN.</p>
          <div class="auth-field"><label>Admin PIN</label><input type="password" id="admin-pin" placeholder="Admin PIN" autocomplete="off"></div>
          <div style="display:flex;gap:0.5rem;margin-top:0.5rem">
            <button type="button" id="pin-back" class="btn btn-outline" style="flex:1">Back</button>
            <button type="submit" id="pin-submit" class="btn btn-primary" style="flex:1">Sign in to admin</button>
          </div>
        </div>
      </form>
      <p style="margin-top:1.25rem;font-size:0.85rem;color:var(--slate)">
        <a href="index.html">← Back to site</a> · <a href="login.html">User login</a>
      </p>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
  <script>
    if (AKILI_ADMIN.getToken() && AKILI_ADMIN.getUser()?.is_admin) {
      location.href = 'admin-panel.html';
    }
    (function() {
      const form = document.getElementById('admin-login-form');
      const credStep = document.getElementById('credentials-step');
      const pinStep = document.getElementById('pin-step');
      const emailEl = document.getElementById('email');
      const passwordEl = document.getElementById('password');
      const pinEl = document.getElementById('admin-pin');

      async function verifyCredentials(email, password) {
        try {
          const data = await AKILI_ADMIN.api('/api/v1/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password }),
          });
          return data;
        } catch (e) {
          throw e;
        }
      }

      form.onsubmit = async (e) => {
        e.preventDefault();
        try {
          if (credStep.style.display !== 'none') {
            // First step: verify email/password
            const email = emailEl.value;
            const password = passwordEl.value;
            const data = await verifyCredentials(email, password);
            if (!data.user?.is_admin) throw new Error('Not an administrator');
            // Move to PIN step
            credStep.style.display = 'none';
            pinStep.style.display = '';
            pinEl.focus();
            return;
          }

          // PIN step: submit admin login with PIN
          const payload = {
            email: emailEl.value,
            password: passwordEl.value,
            admin_pin: pinEl.value,
          };
          const out = await AKILI_ADMIN.api('/api/v1/admin/login', {
            method: 'POST',
            body: JSON.stringify(payload),
          });
          if (!out.user?.is_admin) throw new Error('Not an administrator');
          AKILI_ADMIN.setSession(out.token, out.user);
          AKILI.showToast('Admin signed in', 'success');
          location.href = 'admin-panel.html';
        } catch (err) {
          AKILI.showToast(err.message, 'error');
          // on error, if during PIN step, go back to credentials so user can re-try password
        }
      };

      document.getElementById('pin-back').addEventListener('click', () => {
        pinStep.style.display = 'none';
        credStep.style.display = '';
      });
    })();
  </script>
</body>
</html>
