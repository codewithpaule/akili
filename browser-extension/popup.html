<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKILI Security</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', sans-serif;
      width: 360px;
      background: white;
      color: #1e293b;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .logo {
      width: 32px;
      height: 32px;
    }
    
    .logo svg {
      width: 100%;
      height: 100%;
    }
    
    .title {
      font-size: 1rem;
      font-weight: 600;
      color: #1e293b;
    }
    
    .domain {
      text-align: center;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      color: #64748b;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .content {
      padding: 1.5rem;
    }
    
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    
    .eye-loader {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
    }
    
    .eye-loader svg {
      width: 100%;
      height: 100%;
    }
    
    .eye-loader .pupil {
      animation: orbit 2s linear infinite;
      transform-origin: center;
    }
    
    @keyframes orbit {
      0% { transform: translate(0, -6px); }
      25% { transform: translate(6px, 0); }
      50% { transform: translate(0, 6px); }
      75% { transform: translate(-6px, 0); }
      100% { transform: translate(0, -6px); }
    }
    
    .loading-text {
      font-size: 0.9rem;
      color: #64748b;
    }
    
    .results {
      display: none;
    }
    
    .score-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    
    .score-number {
      font-size: 2.5rem;
      font-weight: 700;
    }
    
    .score-grade {
      font-size: 1.5rem;
      font-weight: 700;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    
    .grade-a, .grade-b { color: #10b981; background: #10b98115; }
    .grade-c { color: #f59e0b; background: #f59e0b15; }
    .grade-d, .grade-f { color: #ef4444; background: #ef444415; }
    
    .findings {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    
    .finding-pill {
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .finding-critical { background: #ef444415; color: #ef4444; border-left: 3px solid #ef4444; }
    .finding-high { background: #f9731615; color: #f97316; border-left: 3px solid #f97316; }
    .finding-medium { background: #eab30815; color: #eab308; border-left: 3px solid #eab308; }
    .finding-low { background: #64748b15; color: #64748b; border-left: 3px solid #64748b; }
    
    .status-banner {
      padding: 0.75rem;
      border-radius: 6px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    
    .status-phishing { background: #ef4444; color: white; }
    .status-malware { background: #ef4444; color: white; }
    .status-clear { background: #10b981; color: white; }
    
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .btn {
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    
    .btn-primary:hover {
      background: #1d4ed8;
    }
    
    .btn-outline {
      background: white;
      color: #1e293b;
      border: 1px solid #e2e8f0;
    }
    
    .btn-outline:hover {
      background: #f8fafc;
    }
    
    .error {
      display: none;
      padding: 1rem;
      text-align: center;
      color: #ef4444;
      font-size: 0.9rem;
    }
    
    .connect-prompt {
      display: none;
      padding: 1.5rem;
      text-align: center;
    }
    
    .connect-prompt h3 {
      margin-bottom: 0.5rem;
      color: #1e293b;
    }
    
    .connect-prompt p {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    
    .input-group {
      margin-bottom: 1rem;
    }
    
    .mode-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      margin-left: auto;
    }
    .mode-badge.deep { background: #ecfdf5; color: #047857; }
    .summary-text {
      font-size: 0.82rem;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 1rem;
      padding: 0.65rem;
      background: #f8fafc;
      border-radius: 6px;
    }
    .footer-links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 0.75rem;
      font-size: 0.75rem;
    }
    .footer-links a { color: #2563eb; text-decoration: none; }
    .settings-bar {
      padding: 0.65rem 1rem;
      border-top: 1px solid #e2e8f0;
      background: #f8fafc;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
    }
    .settings-bar input {
      flex: 1;
      padding: 0.35rem 0.5rem;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="#2563eb" stroke-width="2"/>
        <circle cx="16" cy="16" r="6" fill="#2563eb"/>
        <circle cx="18" cy="14" r="2" fill="#fff"/>
      </svg>
    </div>
    <div class="title">AKILI Security</div>
    <span class="mode-badge" id="mode-badge">Guest</span>
  </div>
  
  <div class="domain" id="current-domain">Loading...</div>
  
  <div class="content">
    <div class="loading" id="loading">
      <div class="eye-loader">
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" stroke="#2563eb" stroke-width="2"/>
          <circle class="pupil" cx="16" cy="16" r="6" fill="#2563eb"/>
          <circle cx="18" cy="14" r="2" fill="#fff"/>
        </svg>
      </div>
      <div class="loading-text" id="loading-text">Planning investigation…</div>
    </div>
    
    <div class="results" id="results">
      <div class="score-display">
        <div class="score-number" id="score">--</div>
        <div class="score-grade" id="grade">--</div>
      </div>
      
      <div class="status-banner" id="status-banner"></div>
      
      <div class="summary-text" id="summary-text" style="display:none"></div>
      
      <div class="findings" id="findings"></div>
      
      <div class="buttons">
        <button class="btn btn-primary" id="full-report-btn">Full report on AKILI</button>
        <button class="btn btn-outline" id="rescan-btn">Rescan</button>
      </div>
      <div class="footer-links">
        <a href="https://akili.com.ng/docs.html" target="_blank" rel="noopener">API docs</a>
        <a href="https://akili.com.ng/developer" target="_blank" rel="noopener">Get API key</a>
      </div>
    </div>
    
    <div class="error" id="error"></div>
    
    <div class="connect-prompt" id="connect-prompt">
      <h3>Connect AKILI</h3>
      <p>Enter your API key to enable security scanning</p>
      <div class="input-group">
        <input type="text" id="api-key-input" placeholder="Enter API key">
      </div>
      <button class="btn btn-primary" id="save-key-btn">Save API Key</button>
      <p style="margin-top: 1rem; font-size: 0.8rem;">
        <a href="https://akili.com.ng/developer" target="_blank" style="color: #2563eb;">Get API Key →</a>
      </p>
    </div>
  </div>
  
  <div class="settings-bar">
    <input type="password" id="api-key-input" placeholder="API key for deep scans" autocomplete="off">
    <button class="btn btn-outline btn-sm" id="save-key-btn" style="padding:0.35rem 0.6rem;font-size:0.75rem">Save</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
