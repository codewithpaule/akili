<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Admin sign in | AKILI</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body class="admin-login-page">
  <div class="auth-wrap">
    <div class="auth-card admin-auth-card">
      <p class="admin-badge">AKILI Admin</p>
      <h1>Control panel</h1>
      <p class="sub">Sign in with your administrator account.</p>
      <form id="admin-login-form">
        <div id="credentials-step">
          <div class="auth-field"><label>Admin email</label><input type="email" id="email" required autocomplete="username"></div>
          <div class="auth-field"><label>Password</label><input type="password" id="password" required autocomplete="current-password"></div>
          <button type="submit" id="cred-submit" class="btn btn-primary" style="width:100%">Continue</button>
        </div>

        <div id="pin-step" style="display:none">
          <p class="sub">Credentials verified. Enter your admin security PIN.</p>
          <div class="auth-field"><label>Admin PIN</label><input type="password" id="admin-pin" placeholder="Admin PIN (if configured)" autocomplete="off"></div>
          <div style="display:flex;gap:0.5rem;margin-top:0.5rem">
            <button type="button" id="pin-back" class="btn btn-outline" style="flex:1">Back</button>
            <button type="submit" id="pin-submit" class="btn btn-primary" style="flex:1">Send verification code</button>
          </div>
        </div>

        <div id="otp-step" style="display:none">
          <p class="sub">A one-time code was sent to your admin email. Enter it below to complete sign-in.</p>
          <div class="auth-field"><label>Verification code</label><input type="text" id="admin-otp" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="6-digit code" autocomplete="one-time-code" required></div>
          <div style="display:flex;gap:0.5rem;margin-top:0.5rem">
            <button type="button" id="otp-back" class="btn btn-outline" style="flex:1">Back</button>
            <button type="submit" id="otp-submit" class="btn btn-primary" style="flex:1">Verify &amp; enter panel</button>
          </div>
        </div>
      </form>
      <p style="margin-top:1.25rem;font-size:0.85rem;color:var(--slate)">
        <a href="/">← Back to site</a> · <a href="/login">User login</a>
      </p>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
  <script>
    const ADMIN_BASE = ((window.AKILI_CONFIG && AKILI_CONFIG.ADMIN_UI_PATH) || '/x9Qp3-admin').replace(/\/+$/, '');
    if (new URLSearchParams(location.search).get('entry') === '1') {
      sessionStorage.setItem('akili_admin_entry', '1');
      history.replaceState(null, '', 'admin-login.html');
    }
    // Only allow access via the secret admin base path
    if (!location.pathname.startsWith(ADMIN_BASE)) {
      location.replace('/');
    }
    // Hide admin page unless you came through admin-entry with a key.
    if (!sessionStorage.getItem('akili_admin_entry') || !sessionStorage.getItem('akili_admin_key')) {
      location.replace('/');
    }
    if (AKILI_ADMIN.getToken() && AKILI_ADMIN.getUser()?.is_admin) {
      location.href = ADMIN_BASE + '/panel';
    }
    (function() {
      const form = document.getElementById('admin-login-form');
      const credStep = document.getElementById('credentials-step');
      const pinStep = document.getElementById('pin-step');
      const otpStep = document.getElementById('otp-step');
      const emailEl = document.getElementById('email');
      const passwordEl = document.getElementById('password');
      const pinEl = document.getElementById('admin-pin');
      const otpEl = document.getElementById('admin-otp');

      function showStep(step) {
        credStep.style.display = step === 'cred' ? '' : 'none';
        pinStep.style.display = step === 'pin' ? '' : 'none';
        otpStep.style.display = step === 'otp' ? '' : 'none';
      }

      async function verifyCredentials(email, password) {
        const data = await AKILI_ADMIN.api('/api/v1/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        return data;
      }

      form.onsubmit = async (e) => {
        e.preventDefault();
        try {
          if (credStep.style.display !== 'none') {
            const email = emailEl.value.trim();
            const password = passwordEl.value;
            const data = await verifyCredentials(email, password);
            if (!data.user?.is_admin) throw new Error('Not an administrator');
            showStep('pin');
            pinEl.focus();
            return;
          }

          if (pinStep.style.display !== 'none') {
            const payload = {
              email: emailEl.value.trim(),
              password: passwordEl.value,
              admin_pin: pinEl.value || '',
            };
            const out = await AKILI_ADMIN.api('/api/v1/admin/login', {
              method: 'POST',
              body: JSON.stringify(payload),
            });
            if (!out.otp_sent) throw new Error(out.message || 'Could not send verification code');
            AKILI.showToast('Verification code sent to your admin email', 'success');
            showStep('otp');
            otpEl.focus();
            return;
          }

          const otp = (otpEl.value || '').trim();
          if (!otp) throw new Error('Enter the verification code from your email');
          const verified = await AKILI_ADMIN.api('/api/v1/admin/verify-otp', {
            method: 'POST',
            body: JSON.stringify({
              email: emailEl.value.trim(),
              password: passwordEl.value,
              admin_pin: otp,
            }),
          });
          if (!verified.user?.is_admin) throw new Error('Not an administrator');
          AKILI_ADMIN.setSession(verified.token, verified.user);
          AKILI.showToast('Admin signed in', 'success');
          location.href = ADMIN_BASE + '/panel';
        } catch (err) {
          AKILI.showToast(err.message || 'Sign-in failed', 'error');
        }
      };

      document.getElementById('pin-back').addEventListener('click', () => showStep('cred'));
      document.getElementById('otp-back').addEventListener('click', () => showStep('pin'));
    })();
  </script>
</body>
</html>
