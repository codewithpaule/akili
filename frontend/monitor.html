<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Monitor — AKILI</title>
<link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/components.css"></head>
<body><div id="nav-mount"></div>
<main class="container" style="padding:2rem 1.5rem">
<h1>Watchlist & Alerts</h1>
<p class="label-sm" style="margin-bottom:1rem">Premium feature — scheduled re-checks with email alerts. Background worker runs when the API scheduler/cron is enabled in production.</p>
<div class="card" style="margin:1.5rem 0">
<input id="target" placeholder="Domain, IP, or email" style="width:100%;padding:0.75rem;border:1px solid var(--border);margin-bottom:0.5rem">
<input id="alert-email" type="email" placeholder="Alert email (defaults to your account email)" style="width:100%;padding:0.75rem;border:1px solid var(--border);margin-bottom:0.5rem">
<select id="freq" style="padding:0.5rem;margin-bottom:1rem"><option value="daily">Daily</option><option value="weekly" selected>Weekly</option></select>
<button class="btn btn-primary" id="add">Add to Watchlist</button>
</div>
<h2 class="label-sm" style="margin-top:2rem">Alert feed</h2>
<div id="alerts-feed" class="card" style="margin-bottom:1.5rem;max-height:240px;overflow-y:auto"></div>
<table class="data-table"><thead><tr><th>Target</th><th>Type</th><th>Frequency</th><th>Last score</th></tr></thead><tbody id="monitors"></tbody></table>
</main>
<script src="js/config.js"></script><script src="js/app.js"></script><script src="js/auth.js"></script>
<script>
if (!AKILI_AUTH.requireAuth('login.html')) throw new Error('auth');
const me = AKILI_AUTH.getUser();
if (me?.email) document.getElementById('alert-email').value = me.email;
async function loadAlerts() {
  try {
    const r = await AKILI.apiFetch('/api/v1/monitor/alerts');
    const d = await r.json();
    document.getElementById('alerts-feed').innerHTML = (d.alerts || []).map(a =>
      `<div style="padding:0.5rem 0;border-bottom:1px solid var(--border)"><span class="badge badge-${a.severity}">${a.alert_type}</span> ${AKILI.escapeHtml(a.message)} <span class="label-sm">${AKILI.formatTime(a.timestamp)}</span></div>`
    ).join('') || '<p class="label-sm">No alerts yet</p>';
  } catch (_) {}
}
async function load() {
  loadAlerts();
  try {
    const r = await AKILI.apiFetch('/api/v1/monitors');
    const d = await r.json();
    document.getElementById('monitors').innerHTML = (d.monitors||[]).map(m=>`<tr><td>${AKILI.escapeHtml(m.target)}</td><td>${m.target_type}</td><td>${m.frequency}</td><td>${AKILI.escapeHtml(m.alert_email||'—')}</td><td>${m.last_score||'—'}</td></tr>`).join('')||'<tr><td colspan="5">No monitors yet</td></tr>';
  } catch(e) { AKILI.showToast(e.message,'error'); }
}
document.getElementById('add').onclick = async () => {
  const alertEmail = (document.getElementById('alert-email').value || me?.email || '').trim();
  await AKILI_AUTH.api('/api/v1/monitors',{method:'POST',body:JSON.stringify({target:document.getElementById('target').value,target_type:'domain',frequency:document.getElementById('freq').value,alert_email:alertEmail})});
  AKILI.showToast('Added to watchlist','success'); load();
};
load();
</script></body></html>
