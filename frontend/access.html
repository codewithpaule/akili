<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to continue | AKILI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="nav-mount"></div>
  <script>fetch('partials/nav.html').then(r=>r.text()).then(h=>document.getElementById('nav-mount').innerHTML=h);</script>
  <main class="container" style="padding:2rem 1.5rem 4rem;max-width:720px">
    <div id="gate-mount"></div>
  </main>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/gate.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const next = params.get('next') || 'dashboard.html';
      const feature = params.get('feature') || AKILI_GATE.featureForPage(next);
      if (AKILI_GATE.isRealSession()) {
        location.replace(next);
        return;
      }
      document.getElementById('gate-mount').innerHTML = AKILI_GATE.buildGateHtml(feature, next);
      if (typeof lucide !== 'undefined') lucide.createIcons();
    })();
  </script>
</body>
</html>
