<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify email — AKILI</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Email verification</h1>
      <p class="sub" id="verify-msg">Confirming your email…</p>
      <a href="dashboard.html" class="btn btn-primary" id="verify-go" style="display:none;width:100%;text-align:center">Go to dashboard</a>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('verify-msg').textContent = 'Missing verification token.';
    } else {
      fetch((AKILI_CONFIG?.API_BASE || 'http://localhost:8001') + '/api/v1/auth/verify-email?token=' + encodeURIComponent(token))
        .then((r) => r.json().then((d) => ({ ok: r.ok, d })))
        .then(({ ok, d }) => {
          if (!ok) throw new Error(d.detail || 'Verification failed');
          document.getElementById('verify-msg').textContent = 'Email verified. You are all set.';
          document.getElementById('verify-go').style.display = 'block';
          if (d.user && AKILI_AUTH?.setSession && AKILI_AUTH.getToken()) {
            AKILI_AUTH.setSession(AKILI_AUTH.getToken(), d.user);
          }
        })
        .catch((e) => {
          document.getElementById('verify-msg').textContent = e.message;
        });
    }
  </script>
</body>
</html>
