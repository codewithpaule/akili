app = "akili-backend"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  # Database URL (Postgres)
  DATABASE_URL = "" # e.g. postgres://user:pass@host:5432/db
  # Redis URL for queueing / scheduling (set to enable background jobs)
  REDIS_URL = "" # e.g. redis://:password@redis-host:6379/0
  # Allowlist for agent egress (comma-separated hostnames)
  AGENT_ALLOWED_HOSTS = ""
  # Max agent actions per scan (use 'unlimited' for no limit)
  MAX_AGENT_ACTIONS = "6"
  # JWT / session secret
  JWT_SECRET = ""
  # Frontend base URL
  FRONTEND_URL = "http://localhost:5501"