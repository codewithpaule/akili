<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandbox — AKILI</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="akili-cursor">
  <div id="nav-mount"></div>
  <main class="container" style="padding:2rem 1.5rem">
    <div class="sandbox-banner">SANDBOX MODE — No real scans. Returns mock data for integration testing.</div>
    <label class="label-sm">Scenario</label>
    <select id="scenario" style="padding:0.5rem;margin:0.5rem 0 1rem;border:1px solid var(--border);border-radius:var(--radius)">
      <option value="clean_scan">Clean scan</option>
      <option value="critical_vulns">Critical vulnerabilities</option>
      <option value="high_confidence_person">High confidence person</option>
      <option value="malicious_ip">Malicious IP</option>
    </select>
    <div class="card">
      <input type="url" id="url" value="https://sandbox.example.com" style="width:100%;padding:0.75rem;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem">
      <button class="btn btn-primary" id="scan-btn">Run Sandbox Scan</button>
    </div>
    <div id="terminal" class="terminal-panel hidden"></div>
    <pre id="json-out" class="code-block hidden" style="margin-top:1rem"></pre>
  </main>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function sandboxHeaders() {
      const headers = { 'Content-Type': 'application/json' };
      const token = localStorage.getItem('akili_token') || (window.AKILI && AKILI.getToken()) || (window.AKILI_AUTH && AKILI_AUTH.getToken());
      if (token) headers['Authorization'] = `Bearer ${token}`;
      return headers;
    }

    document.getElementById('scan-btn').onclick = async () => {
      const scenario = document.getElementById('scenario').value;
      const url = `${AKILI.API()}/api/v1/sandbox/scan/website?scenario=${encodeURIComponent(scenario)}`;
      const btn = document.getElementById('scan-btn');
      btn.disabled = true;
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: sandboxHeaders(),
          body: JSON.stringify({ url: document.getElementById('url').value }),
        });
        const text = await res.text();
        if (!res.ok) {
          let msg = res.statusText;
          try { const j = JSON.parse(text); msg = j.detail || msg; } catch (_) {}
          throw new Error(msg);
        }
        const m = text.match(/COMPLETE:(\{[\s\S]*\})/);
        if (m) {
          document.getElementById('json-out').classList.remove('hidden');
          document.getElementById('json-out').textContent = JSON.stringify(JSON.parse(m[1]), null, 2);
        }
        document.getElementById('terminal').classList.remove('hidden');
        document.getElementById('terminal').textContent = text;
        AKILI.showToast('Sandbox complete', 'success');
      } catch (e) {
        AKILI.showToast(e.message || 'Sandbox failed', 'error');
      } finally {
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
