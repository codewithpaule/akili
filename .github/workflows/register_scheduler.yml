name: Register RQ Scheduler

on:
  push:
    branches: [ main ]

jobs:
  register-scheduler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Register scheduler in Redis
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          python backend/register_scheduler.py

# Note: Ensure the secret REDIS_URL is configured in GitHub repo secrets.
# This workflow only registers scheduled jobs in Redis. It does not perform fly deploy.
# Add this step after your deploy step in your CI or run it as a post-deploy job.
